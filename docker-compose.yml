services:
  kanbaroo-api:
    build: .
    image: kanbaroo/kanbaroo:dev
    container_name: kanbaroo-api
    ports:
      - "8080:8080"
    volumes:
      - ${KANBAROO_DATA_DIR:?KANBAROO_DATA_DIR is required - see docs/deployment-dogfood.md}:/data
    environment:
      KANBAROO_DATABASE_URL: "sqlite:////data/kanbaroo.db"
    restart: unless-stopped
