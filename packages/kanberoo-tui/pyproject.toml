[project]
name = "kanberoo-tui"
version = "0.2.1"
description = "Kanberoo terminal UI (Textual)"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Adam Reese" }]
dependencies = [
    "kanberoo-core",
    "textual>=0.70",
    "httpx>=0.27",
    "websockets>=12.0",
]

[project.scripts]
kanberoo-tui = "kanberoo_tui.app:main"

[tool.uv.sources]
kanberoo-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kanberoo_tui"]
