[project]
name = "kanbaroo-cli"
version = "0.2.2"
description = "Kanbaroo command-line interface"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Adam Reese" }]
dependencies = [
    "kanbaroo-core",
    "typer>=0.12",
    "rich>=13.7",
    "httpx>=0.27",
]

[project.scripts]
kanbaroo = "kanbaroo_cli.app:app"
kb = "kanbaroo_cli.app:app"

[tool.uv.sources]
kanbaroo-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kanbaroo_cli"]
