[project]
name = "kanbaroo-core"
version = "0.2.2"
description = "Kanbaroo core: models, schemas, business logic, migrations"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Adam Reese" }]
dependencies = [
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "pydantic>=2.7",
    "uuid-utils>=0.9",
    "pyarrow>=15",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kanbaroo_core"]

[tool.hatch.build.targets.wheel.force-include]
"alembic" = "kanbaroo_core/alembic"
