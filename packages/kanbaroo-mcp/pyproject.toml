[project]
name = "kanbaroo-mcp"
version = "0.2.2"
description = "Kanbaroo MCP server for AI agent integration"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Adam Reese" }]
dependencies = [
    "kanbaroo-core",
    "mcp>=1.0",
    "httpx>=0.27",
    "anyio>=4.0",
]

[project.scripts]
kanbaroo-mcp = "kanbaroo_mcp.server:main"

[tool.uv.sources]
kanbaroo-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kanbaroo_mcp"]
