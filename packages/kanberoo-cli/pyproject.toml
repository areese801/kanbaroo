[project]
name = "kanberoo-cli"
version = "0.2.1"
description = "Kanberoo command-line interface"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Adam Reese" }]
dependencies = [
    "kanberoo-core",
    "typer>=0.12",
    "rich>=13.7",
    "httpx>=0.27",
]

[project.scripts]
kanberoo = "kanberoo_cli.app:app"
kb = "kanberoo_cli.app:app"

[tool.uv.sources]
kanberoo-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kanberoo_cli"]
