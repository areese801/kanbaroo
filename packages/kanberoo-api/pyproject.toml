[project]
name = "kanberoo-api"
version = "0.1.0"
description = "Kanberoo REST + WebSocket API server"
readme = "../../README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Adam Reese" }]
dependencies = [
    "kanberoo-core",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "websockets>=12.0",
]

[tool.uv.sources]
kanberoo-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kanberoo_api"]
