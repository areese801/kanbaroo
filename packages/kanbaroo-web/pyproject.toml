[project]
name = "kanbaroo-web"
version = "0.2.2"
description = "Kanbaroo phase 2 web UI: React SPA plus static asset bundle served by kanbaroo-api."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Adam Reese" }]
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kanbaroo_web"]
artifacts = ["src/kanbaroo_web/dist/**"]

[tool.hatch.build.targets.sdist]
include = [
    "src/kanbaroo_web/**",
    "README.md",
]
artifacts = ["src/kanbaroo_web/dist/**"]
