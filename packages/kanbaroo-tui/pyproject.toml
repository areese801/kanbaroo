[project]
name = "kanbaroo-tui"
version = "0.2.2"
description = "Kanbaroo terminal UI (Textual)"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Adam Reese" }]
dependencies = [
    "kanbaroo-core",
    "textual>=0.70",
    "httpx>=0.27",
    "websockets>=12.0",
]

[project.scripts]
kanbaroo-tui = "kanbaroo_tui.app:main"

[tool.uv.sources]
kanbaroo-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kanbaroo_tui"]
