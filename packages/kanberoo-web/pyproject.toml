[project]
name = "kanberoo-web"
version = "0.2.1"
description = "Kanberoo phase 2 web UI: React SPA plus static asset bundle served by kanberoo-api."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Adam Reese" }]
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kanberoo_web"]
artifacts = ["src/kanberoo_web/dist/**"]

[tool.hatch.build.targets.sdist]
include = [
    "src/kanberoo_web/**",
    "README.md",
]
artifacts = ["src/kanberoo_web/dist/**"]
