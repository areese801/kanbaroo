[project]
name = "kanberoo-mcp"
version = "0.2.0"
description = "Kanberoo MCP server for AI agent integration"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Adam Reese" }]
dependencies = [
    "kanberoo-core",
    "mcp>=1.0",
    "httpx>=0.27",
    "anyio>=4.0",
]

[project.scripts]
kanberoo-mcp = "kanberoo_mcp.server:main"

[tool.uv.sources]
kanberoo-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kanberoo_mcp"]
