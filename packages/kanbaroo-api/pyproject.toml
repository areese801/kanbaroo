[project]
name = "kanbaroo-api"
version = "0.2.2"
description = "Kanbaroo REST + WebSocket API server"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Adam Reese" }]
dependencies = [
    "kanbaroo-core",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "websockets>=12.0",
]

[project.optional-dependencies]
web = ["kanbaroo-web"]

[project.scripts]
kanbaroo-api = "kanbaroo_api.server:run"

[tool.uv.sources]
kanbaroo-core = { workspace = true }
kanbaroo-web = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kanbaroo_api"]
